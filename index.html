:root {
  scroll-behavior: smooth;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0a0a0a;
  color:#fff;
}

/* HERO */
.hero{
  position:relative;
  height:260px;
  overflow:hidden;
}

.hero-bg{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay neon gradient */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,0,255,0.6), rgba(0,255,255,0.6));
  mix-blend-mode:overlay;
}
/* GLASS CARD */
.glass{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin: -60px 15px 20px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 30px rgba(0,255,255,0.2);
}

/* TOP */
.top{
  display:flex;
  gap:15px;
  align-items:center;
}

.card {
  padding: 20px;
}

.app-info {
  display: flex;
  gap: 15px;
}


.logo {
  width: 68px;
  height:68px;
  background: #0f0f0f;
  border-radius: 12px;
  padding: 0px;
  object-fit: cover;
}
h2{
  font-size:18px;
  font-weight:600;
}

.sub{
  font-size:13px;
  color:#bbb;
}

.devmdn{
  color:#00f2ff;
  margin-top:6px;
  font-size:14px;
}

.dev{
  color:#aaa;
  font-size:13px;
}

.badges{
  margin-top:10px;
}

.badge{
  padding:5px 12px;
  border-radius:20px;
  font-size:11px;
  margin-right:6px;
}

.orange{background:#ff8c00;}
.green{background:#2ecc71;}

/* TEXT */
.mod{
  margin-top:20px;
  color:#a64bf4;
  font-style:italic;
}

/* DESC */
.desc{
  margin-top:15px;
  color:#bbb;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  text-align: center;
  margin: 20px 0;
}

.stats h3 {
  margin: 0;
}

.stats p {
  font-size: 12px;
  color: #aaa;
}

/* BUTTON */
.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(135deg,#a64bf4,#00f2ff);
  box-shadow:0 0 20px rgba(255,0,255,0.6);
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 30px rgba(0,255,255,0.8);
}


  ]]></b:skin>
