<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modwanz Manager</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root { scroll-behavior: smooth; }

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0a0a0a;
  color:#fff;
}

/* HERO */
.hero{
  position:relative;
  height:260px;
  overflow:hidden;
}

.hero-bg{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,0,255,0.6), rgba(0,255,255,0.6));
  mix-blend-mode:overlay;
}

/* GLASS */
.glass{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin: -60px 15px 20px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 30px rgba(0,255,255,0.2);
}

/* TOP */
.app-info{
  display:flex;
  gap:15px;
}

.logo{
  width:68px;
  height:68px;
  border-radius:12px;
}

h2{
  font-size:18px;
}

.dev{
  font-size:13px;
  color:#bbb;
}

.devmdn{
  color:#00f2ff;
  font-size:14px;
}

.badges{
  margin-top:10px;
}

.badge{
  padding:5px 12px;
  border-radius:20px;
  font-size:11px;
  margin-right:6px;
}

.orange{background:#ff8c00;}
.green{background:#2ecc71;}

.mod{
  margin-top:20px;
  color:#a64bf4;
  font-style:italic;
}

.desc{
  margin-top:15px;
  color:#bbb;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin:20px 0;
}

.stats p{
  font-size:12px;
  color:#aaa;
}

/* BUTTON */
.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(135deg,#a64bf4,#00f2ff);
  box-shadow:0 0 20px rgba(255,0,255,0.6);
}

</style>
</head>

<body>

<div class="hero">
  <img class="hero-bg" src="https://raw.githubusercontent.com/modwanz/modwanzmanager/main/Logo/file_000000008720720bb8398b3355170173.png">
  <div class="overlay"></div>
</div>

<div class="glass">

  <div class="app-info">
    <img class="logo" src="https://raw.githubusercontent.com/modwanz/modwanzmanager/main/Logo/rz_modwanz.png">
    <div>
      <h2>Modwanz Manager<br>v1.1 - MOD APK</h2>
      <p class="dev">Unlocked • Amoled • No Ads</p>
      <p class="devmdn">Ridwan Zaelani</p>

      <div class="badges">
        <span class="badge orange">MANAGER</span>
        <span class="badge green">PREMIUM</span>
      </div>
    </div>
  </div>

  <p class="mod">MOD: Premium Unlocked</p>

  <p class="desc">
    Manage Android mods and apps quickly, safely, and efficiently.
  </p>

  <div class="stats">
    <div>
      <h3>1.1</h3>
      <p>Version</p>
    </div>
    <div>
      <h3>6.94M</h3>
      <p>Size</p>
    </div>
    <div>
      <h3>3.8 ★</h3>
      <p>Ratings</p>
    </div>
  </div>

  <button class="btn" onclick="downloadAPK()">Download APK</button>

</div>

<script>
function downloadAPK(){
  alert("Tambahkan link download APK di sini!");
}
</script>

</body>
</html>
